<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Box Base -->
  <rect x="20" y="40" width="60" height="50" rx="4" fill="url(#boxGrad)" />
  <!-- Lid -->
  <rect x="15" y="30" width="70" height="15" rx="3" fill="#ec4899" />
  <!-- Ribbon Vertical -->
  <rect x="45" y="30" width="10" height="60" fill="white" fill-opacity="0.3" />
  <!-- Ribbon Horizontal -->
  <rect x="15" y="32" width="70" height="6" fill="white" fill-opacity="0.2" />
  <!-- Bow -->
  <path d="M50 30 C40 10 20 20 50 30 C80 20 60 10 50 30" fill="white" stroke="#ec4899" stroke-width="2" />
  <circle cx="50" cy="30" r="4" fill="white" />
</svg>